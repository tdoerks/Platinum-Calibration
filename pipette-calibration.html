<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipette Calibration — ISO 8655</title>
<!--
  pipette-calibration.html — unified ISO 8655 pipette calibration tool.
  Generated by build-tool from tool_spec.md (archetype: calculator).
  Single self-contained file: no build step, no server, runs offline.
  Math (sample SD, strict precision SD<=ul, mean-in-range accuracy, Z-factor env correction)
  follows the SPEC, which intentionally differs from the legacy index.html in three places.
  ISO tolerance tables + test-volume map ported verbatim from the legacy app.
-->
<style>
  :root{
    --bg:#f4f6f8; --card:#fff; --ink:#1f2933; --muted:#6b7280; --line:#d8dee5;
    --accent:#1565c0; --accent2:#0d47a1; --pass:#1b7a32; --fail:#c0271a; --warn:#b25e00;
    --pass-bg:#e6f4ea; --fail-bg:#fdecea; --warn-bg:#fff4e5;
  }
  body.dark{
    --bg:#11161c; --card:#1b2330; --ink:#e7edf3; --muted:#9aa7b4; --line:#2c3744;
    --accent:#4f9cf0; --accent2:#7db4f5; --pass:#5bd07a; --fail:#ff7a6e; --warn:#ffb454;
    --pass-bg:#16301f; --fail-bg:#341a17; --warn-bg:#332515;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  header{background:var(--accent2);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header h1{font-size:18px;margin:0;font-weight:600}
  header .logo{height:34px;width:34px;border-radius:6px;background:#fff;color:var(--accent2);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  header .spacer{flex:1}
  .badge-service{padding:4px 10px;border-radius:14px;font-weight:700;font-size:12px;background:#fff;color:var(--accent2)}
  .badge-service.basic{background:#1b7a32;color:#fff}
  button{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:7px 12px;border-radius:7px}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  button.ghost{background:transparent;color:#fff;border-color:rgba(255,255,255,.5)}
  button.sm{padding:4px 8px;font-size:12px}
  button.danger{color:var(--fail);border-color:var(--fail)}
  .wrap{max-width:1100px;margin:0 auto;padding:16px}
  .tabs{display:flex;gap:6px;margin:14px 0}
  .tabs button{border-radius:8px}
  .tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px}
  .card h2{margin:0 0 12px;font-size:15px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:3px}
  input,select{width:100%;padding:7px 8px;border:1px solid var(--line);border-radius:6px;background:var(--card);color:var(--ink);font:inherit}
  input.bad{border-color:var(--fail)}
  input.outlier{border-color:var(--warn) !important;background:var(--warn-bg)}
  .cv-good{color:var(--pass);font-weight:600}.cv-warn{color:var(--warn);font-weight:600}.cv-bad{color:var(--fail);font-weight:600}
  .dupwarn{color:var(--fail);font-size:11px;font-weight:600;margin-top:3px}
  .reason{background:var(--fail-bg);border-left:3px solid var(--fail);padding:10px;border-radius:6px;margin-top:10px}
  .hint{font-size:11px;color:var(--muted);margin-top:3px}
  .warn-text{font-size:11px;color:var(--warn);margin-top:3px}
  .pipette{border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px;background:var(--card)}
  .pipette.basic{border-left:4px solid var(--pass)}
  .pipette.platinum{border-left:4px solid var(--accent)}
  .pipette-head{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .pipette-head .title{font-weight:700}
  table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13px}
  th,td{border:1px solid var(--line);padding:5px 6px;text-align:center}
  th{background:rgba(127,127,127,.08);font-weight:600}
  td input{padding:5px;text-align:center}
  .status{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-weight:700;font-size:12px}
  .status.pass{background:var(--pass-bg);color:var(--pass)}
  .status.fail{background:var(--fail-bg);color:var(--fail)}
  .status.pending{background:rgba(127,127,127,.15);color:var(--muted)}
  .calc{background:rgba(127,127,127,.06);border-radius:7px;padding:9px;margin-top:8px;font-size:12px}
  .calc .pt{margin-bottom:6px}
  .env-note{background:var(--warn-bg);border-left:3px solid var(--warn);padding:8px;border-radius:5px;margin:8px 0;font-size:12px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0}
  .toolbar .spacer{flex:1}
  .cert{background:#fff;color:#111;border:1px solid #ccc;border-radius:8px;padding:24px;margin-bottom:18px}
  .cert h3{margin:0 0 4px}
  .cert .meta{font-size:12px;color:#444;margin-bottom:10px}
  .cert table{font-size:12px}
  .muted{color:var(--muted)}
  .hist-row{display:flex;gap:10px;align-items:center;padding:8px;border:1px solid var(--line);border-radius:7px;margin-bottom:6px}
  .hist-row .spacer{flex:1}
  @media (max-width:640px){ .pipette-head{flex-direction:column;align-items:stretch} }
  @media print{
    header,.tabs,.toolbar,.no-print,button{display:none !important}
    body{background:#fff}
    .wrap{max-width:none;padding:0}
    .cert{border:none;page-break-after:always;padding:0}
    #tab-cert{display:block !important}
    #tab-cal,#tab-hist{display:none !important}
    @page{size:portrait;margin:14mm}
  }
</style>
</head>
<body>
<header>
  <div class="logo">CI</div>
  <h1>Pipette Calibration <span class="muted" style="font-weight:400;font-size:12px">ISO 8655</span></h1>
  <span id="serviceBadge" class="badge-service">PLATINUM</span>
  <div class="spacer"></div>
  <button class="ghost sm" onclick="toggleDark()" id="darkBtn">🌙 Dark</button>
</header>

<div class="wrap">
  <div class="tabs no-print">
    <button id="t-cal" class="active" onclick="showTab('cal')">Calibration</button>
    <button id="t-cert" onclick="showTab('cert')">Certificate</button>
    <button id="t-hist" onclick="showTab('hist')">History</button>
  </div>

  <!-- ============ CALIBRATION TAB ============ -->
  <div id="tab-cal">
    <div class="card">
      <h2>Session Information</h2>
      <div class="grid">
        <div>
          <label>Service Level</label>
          <select id="serviceLevel" onchange="onServiceChange()">
            <option value="platinum">🏆 Platinum (full gravimetric, ISO 8655)</option>
            <option value="basic">⚡ Basic (quick pass/fail)</option>
          </select>
        </div>
        <div><label>Technician (initials)</label><input id="technician" oninput="onSessionInput()" placeholder="TSD"></div>
        <div><label>PI / Client (last name)</label><input id="client" oninput="onSessionInput()" placeholder="Doerksen"></div>
        <div><label>Location</label><input id="location" oninput="autoSave()"></div>
        <div><label>Service Date</label><input id="serviceDate" type="date" oninput="onSessionInput()"></div>
        <div><label>Calibration Date</label><input id="calDate" type="date" oninput="onSessionInput()"></div>
        <div><label>Frequency</label>
          <select id="frequency" onchange="onSessionInput()"><option>A</option><option>S</option><option>Q</option><option>M</option></select>
        </div>
        <div><label>Counter #</label><input id="counter" type="number" min="1" value="1" oninput="onSessionInput()"></div>
        <div><label>Work Order (auto)</label><input id="workOrder" placeholder="auto" oninput="autoSave()"></div>
        <div><label>Invoice (auto)</label><input id="invoice" placeholder="auto" oninput="autoSave()"></div>
        <div><label>Balance / Traceability</label><input id="balanceInfo" oninput="autoSave()"></div>
      </div>
      <div id="envBlock" style="margin-top:12px">
        <h2 style="font-size:13px">Environmental Conditions (ISO 8655-6 — Platinum)</h2>
        <div class="grid">
          <div><label>Temperature (°C)</label><input id="temperature" type="number" step="0.1" oninput="onEnvInput()"><div id="w-temperature" class="warn-text"></div></div>
          <div><label>Pressure (kPa)</label><input id="pressure" type="number" step="0.1" oninput="onEnvInput()"><div id="w-pressure" class="warn-text"></div></div>
          <div><label>Humidity (% RH)</label><input id="humidity" type="number" step="1" oninput="onEnvInput()"><div id="w-humidity" class="warn-text"></div></div>
        </div>
        <div id="zinfo" class="hint"></div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <button class="primary" onclick="addPipette()">+ Add Pipette</button>
        <button class="sm" onclick="bulkStatus('pass')">Mark all As Left PASS</button>
        <button class="sm" onclick="bulkStatus('fail')">Mark all As Left FAIL</button>
        <div class="spacer"></div>
        <span class="hint">Ctrl+N add · Ctrl+D duplicate last · Ctrl+S save</span>
      </div>
      <div id="pipettes"></div>
      <div id="emptyMsg" class="muted">No pipettes yet — click <strong>+ Add Pipette</strong> to begin.</div>
    </div>

    <div class="toolbar no-print">
      <button onclick="saveSession()">💾 Save session to history</button>
      <button onclick="exportJSON()">⬇ Export JSON</button>
      <button onclick="document.getElementById('importFile').click()">⬆ Import JSON</button>
      <input id="importFile" type="file" accept="application/json" style="display:none" onchange="importJSON(this.files[0])">
      <button onclick="exportCSV()">⬇ Export CSV</button>
      <button onclick="renderCert();showTab('cert');window.print()">🖨 Print certificate</button>
    </div>
  </div>

  <!-- ============ CERTIFICATE TAB ============ -->
  <div id="tab-cert" style="display:none">
    <div class="toolbar no-print"><button class="primary" onclick="window.print()">🖨 Print / Save PDF</button></div>
    <div id="certBody"></div>
  </div>

  <!-- ============ HISTORY TAB ============ -->
  <div id="tab-hist" style="display:none">
    <div class="card"><h2>Saved Sessions</h2><div id="histBody"><span class="muted">No saved sessions.</span></div></div>
  </div>
</div>

  'P-2':{low:0.5,mid:1,high:2},'P-2.5':{low:0.5,mid:1.25,high:2.5},'P-10':{low:2,mid:5,high:10},

  'P-300':{low:50,mid:200,high:300},'P-500':{low:100,mid:250,high:500},'P-1000':{low:200,mid:500,high:1000},
  'P-1200':{low:250,mid:600,high:1200},'P-1250':{low:250,mid:625,high:1250},'P-2000':{low:500,mid:1000,high:2000},
  'P-5000':{low:1000,mid:2500,high:5000},'P-10000':{low:2000,mid:5000,high:10000}
};
const MODELS = Object.keys(isoSpecs);
const BRANDS = ['Eppendorf','Gilson','Rainin','Thermo Finnpipette','VWR','Sartorius','BRAND','Hamilton','Mettler Toledo','Labnet','Oxford','Socorex','Capp','Integra','Nichiryo'];
const ADJ_SPEC = {
  SE:{label:'Seal (SE)', opts:['Has but not replaced','Replaced','Silicone','Other'], other:'Other'},
  COR:{label:'Corrosion (COR)', opts:['1','2','3']},
  G:{label:'Grease (G)', opts:['K','D']},

const ADJ_CODES = Object.keys(ADJ_SPEC);
const OOS_REASONS = ['Low','High','Leaks','Sticky-Stiff','Broken','Other'];
const BRAND_KEY = 'platinumBrandHistory';
const ENV_RANGES = {temperature:{min:15,max:30,opt:[20,25],unit:'°C'},pressure:{min:95,max:105,opt:[98,102],unit:'kPa'},humidity:{min:30,max:80,opt:[40,60],unit:'%RH'}};
const STORE_KEY='platinumPipetteCalibration_v2'; // <!-- REVIEW: legacy session-autosave key string not located; using a fresh v2 key. If you need old localStorage sessions to load, set this to the legacy key. -->

/* ====================== STATE ====================== */
function defaultState(){
  return { serviceLevel:'platinum', technician:'', client:'', location:'', serviceDate:'', calDate:'',
    frequency:'A', counter:1, workOrder:'', invoice:'', balanceInfo:'',
    temperature:'', pressure:'', humidity:'', pipettes:[], nextId:1 };
}

/* ====================== ISO 8655 MATH (per spec) ====================== */
function mean(a){ const v=a.map(Number).filter(x=>!isNaN(x)); return v.length? v.reduce((s,x)=>s+x,0)/v.length : NaN; }
function sampleSD(a){ // sample SD (÷ n-1) per ISO 8655 — spec decision #1
  const v=a.map(Number).filter(x=>!isNaN(x)); if(v.length<2) return NaN;
  const m=v.reduce((s,x)=>s+x,0)/v.length;
  return Math.sqrt(v.reduce((s,x)=>s+(x-m)*(x-m),0)/(v.length-1));
}
function cvPct(a){ const m=mean(a), s=sampleSD(a); return (isNaN(m)||m===0||isNaN(s))?NaN:(s/m)*100; }
function waterDensity(t){ return 999.85308+6.32693e-2*t-8.523829e-3*t*t+6.943248e-5*t*t*t-3.821216e-7*t*t*t*t; }
function airDensity(tC,pKPa,rhPct){
  const T=tC+273.15, P=pKPa*1000, RH=rhPct/100;
  const Psat=611.2*Math.exp((17.67*tC)/(tC+243.5)); const Pw=RH*Psat; const Pd=P-Pw;
  return Pd/(287.05*T)+Pw/(461.495*T);
}
function zFactor(tC,pKPa,rhPct){ const ra=airDensity(tC,pKPa,rhPct), rw=waterDensity(tC); return (1-ra/8000)/(1-ra/rw); }
function envConditions(){
  const t=parseFloat(state.temperature),p=parseFloat(state.pressure),h=parseFloat(state.humidity);
  const ok=!isNaN(t)&&!isNaN(p)&&!isNaN(h);
  return {t,p,h,ok,z: ok? zFactor(t,p,h):1.0};
}
function getSpec(model,volume,isMulti){ const db=isMulti?isoSpecsMulti:isoSpecs; return db[model]&&db[model][volume]?db[model][volume]:null; }

// Compute one test point. readings are raw µL; applies Z (Platinum) then ISO checks.
function computePoint(model, point, readings, isMulti){
  const nominal = TEST_VOLUMES[model] ? TEST_VOLUMES[model][point] : null;
  const spec = nominal!=null ? getSpec(model, nominal, isMulti) : null;
  const env = envConditions();
  const z = (state.serviceLevel==='platinum' && env.ok) ? env.z : 1.0;
  const corrected = readings.map(r=>{ const n=parseFloat(r); return isNaN(n)?NaN:n*z; });
  const m = mean(corrected), sd = sampleSD(corrected), cv = cvPct(corrected);
  let accuracyPass=null, precisionPass=null, overall=null;
  if(spec && !isNaN(m) && !isNaN(sd)){
    accuracyPass = (m >= spec.accuracy.from && m <= spec.accuracy.to);       // mean-in-range (spec #3)
    precisionPass = (sd <= spec.precision.ul);                               // strict SD<=ul (spec #2)
    overall = accuracyPass && precisionPass;
  }
  return {nominal, spec, z, correctionApplied:z!==1.0, mean:m, sd, cv, accuracyPass, precisionPass, overall};
}

function vprec(vol){ return vol<=25 ? 2 : 1; }
function fmt(v,d){ if(v==null||isNaN(v)) return '—'; return Number(v).toFixed(d==null?vprec(Math.abs(v)):d); }
function ae(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

/* ====================== SESSION / NUMBERING ====================== */
function syncSessionFromInputs(){
  ['serviceLevel','technician','client','location','serviceDate','calDate','frequency','workOrder','invoice','balanceInfo','temperature','pressure','humidity'].forEach(id=>{
    const el=document.getElementById(id); if(el) state[id]=el.value;
  });
  const c=document.getElementById('counter'); if(c) state.counter=c.value;
}
function autoNumbers(){
  const last=(state.client||'').trim();
  const d = state.serviceDate||state.calDate||'';
  let mm='', dd='', yy='';
  if(d){ const [Y,M,D]=d.split('-'); mm=M; dd=D; yy=(Y||'').slice(2); }
  else { const t=new Date(); mm=String(t.getMonth()+1).padStart(2,'0'); dd=String(t.getDate()).padStart(2,'0'); yy=String(t.getFullYear()).slice(2); }
  const cnt=state.counter||1, freq=state.frequency||'A';
  if(last && mm && dd){
    state.workOrder = `${last} ${mm}-${dd} ${cnt}#${freq}`;
    state.invoice = `${(state.technician||'').toUpperCase()}${dd}${mm}${yy}${String(cnt).padStart(2,'0')}${freq}`;
    document.getElementById('workOrder').value=state.workOrder;
    document.getElementById('invoice').value=state.invoice;
  }
}
function onSessionInput(){ syncSessionFromInputs(); autoNumbers(); autoSave(); }
function onServiceChange(){
  syncSessionFromInputs();
  document.getElementById('serviceBadge').textContent = state.serviceLevel.toUpperCase();
  document.getElementById('serviceBadge').className = 'badge-service'+(state.serviceLevel==='basic'?' basic':'');
  document.getElementById('envBlock').style.display = state.serviceLevel==='platinum'?'':'none';
  renderPipettes(); autoSave();
}
function onEnvInput(){ syncSessionFromInputs(); ['temperature','pressure','humidity'].forEach(validateEnv); showZ(); renderPipettes(); autoSave(); }
function validateEnv(name){
  const el=document.getElementById(name), w=document.getElementById('w-'+name); if(!el) return;
  const v=parseFloat(el.value), r=ENV_RANGES[name]; el.classList.remove('bad'); w.textContent='';
  if(isNaN(v)) return;
  if(v<r.min||v>r.max){ el.classList.add('bad'); w.style.color='var(--fail)'; w.textContent=`⚠ Out of range (${r.min}–${r.max} ${r.unit})`; }
  else if(v<r.opt[0]||v>r.opt[1]){ w.style.color='var(--warn)'; w.textContent=`⚠ Outside optimal (${r.opt[0]}–${r.opt[1]} ${r.unit})`; }
}
function showZ(){
  const env=envConditions(); const el=document.getElementById('zinfo');
  el.textContent = env.ok ? `Z-factor = ${env.z.toFixed(6)} (buoyancy correction applied to readings)` : 'Enter temp + pressure + humidity to apply ISO 8655-6 buoyancy correction (Z=1.000 until then).';
}

/* ====================== PIPETTES ====================== */
function blankMeasure(){ return {asFound:{low:['','','',''],mid:['','','',''],high:['','','','']},
                                  asLeft:{low:['','','',''],mid:['','','',''],high:['','','','']}}; }
function addPipette(dup){
  const base={ id:state.nextId++, serviceLevel:state.serviceLevel, brandModel:'', model:'P-100', serial:'',
    channelType:'single', measurements:blankMeasure(), comments:'',
    basic:{ asFoundSpec:'', outOfSpecReason:'', reasonNote:'', adjustments:{}, readings100:['','','',''], reading20:'' },
    statusAsLeft:'pending' };
  if(dup && state.pipettes.length){ const p=state.pipettes[state.pipettes.length-1];
    base.brandModel=p.brandModel; base.model=p.model; base.channelType=p.channelType; base.serviceLevel=p.serviceLevel; }
  state.pipettes.push(base); renderPipettes(); autoSave();
}
function removePipette(id){ state.pipettes=state.pipettes.filter(p=>p.id!==id); renderPipettes(); autoSave(); }
function dupPipette(id){ const p=state.pipettes.find(x=>x.id===id); if(!p) return;
  const c=JSON.parse(JSON.stringify(p)); c.id=state.nextId++; c.serial=''; state.pipettes.push(c); renderPipettes(); autoSave(); }
function setField(id,k,v){ const p=state.pipettes.find(x=>x.id===id); if(!p) return; p[k]=v;
  if(k==='brandModel') saveBrand(v);
  if(k==='channelType'||k==='model'||k==='serial'){ renderPipettes(); } autoSave(); }
function setReading(id,cond,pt,i,v){ const p=state.pipettes.find(x=>x.id===id); if(!p) return;
  p.measurements[cond][pt][i]=v; renderOneCalc(p); autoSave(); }
function setBasic(id,k,v){ const p=state.pipettes.find(x=>x.id===id); if(!p) return; p.basic[k]=v; autoSave(); renderPipettes(); }
function setBasicArr(id,arr,i,v){ const p=state.pipettes.find(x=>x.id===id); if(!p) return;
  (p.basic[arr]=p.basic[arr]||['','','',''])[i]=v; autoSave(); renderPipettes(); }
function setAdj(id,code,k,v){ const p=state.pipettes.find(x=>x.id===id); if(!p) return;
  if(!p.basic.adjustments||Array.isArray(p.basic.adjustments)) p.basic.adjustments={};
  const a=p.basic.adjustments[code]=p.basic.adjustments[code]||{on:false,val:'',other:''}; a[k]=v; autoSave(); renderPipettes(); }
function bulkStatus(s){ state.pipettes.forEach(p=>p.statusAsLeft=s); renderPipettes(); autoSave(); }

/* brand smart-history (localStorage) */
function loadBrands(){ try{ return JSON.parse(localStorage.getItem(BRAND_KEY))||[]; }catch(e){ return []; } }
function saveBrand(v){ v=(v||'').trim(); if(!v) return; if(BRANDS.concat(loadBrands()).includes(v)) return;
  const h=loadBrands(); h.push(v); localStorage.setItem(BRAND_KEY,JSON.stringify(h)); rebuildBrandList(); }
function rebuildBrandList(){ const dl=document.getElementById('brandlist'); if(!dl) return;
  dl.innerHTML=BRANDS.concat(loadBrands()).map(b=>`<option value="${b}">`).join(''); }

/* duplicate-serial detection */
function serialCounts(){ const m={}; state.pipettes.forEach(p=>{ const s=(p.serial||'').trim(); if(s) m[s]=(m[s]||0)+1; }); return m; }
function isDupSerial(p){ const s=(p.serial||'').trim(); return !!(s && serialCounts()[s]>1); }

/* Basic-mode auto-grade: 100% (mean of 4) + 20% (1 reading) each within the ISO accuracy range */
function computeBasic(p){
  p.basic=p.basic||{}; p.basic.readings100=p.basic.readings100||['','','',''];
  if(!p.basic.adjustments||Array.isArray(p.basic.adjustments)) p.basic.adjustments={};
  const model=p.model, hv=TEST_VOLUMES[model].high, lv=TEST_VOLUMES[model].low;
  const s100=getSpec(model,hv,false), s20=getSpec(model,lv,false);
  const m100=mean(p.basic.readings100); const r20=parseFloat(p.basic.reading20);
  const has100=p.basic.readings100.some(x=>x!==''&&!isNaN(parseFloat(x))); const has20=!isNaN(r20);
  const in100=(s100&&has100&&!isNaN(m100))?(m100>=s100.accuracy.from&&m100<=s100.accuracy.to):null;
  const in20=(s20&&has20)?(r20>=s20.accuracy.from&&r20<=s20.accuracy.to):null;
  let result='pending'; if(in100!==null&&in20!==null) result=(in100&&in20)?'pass':'fail';  // final readings ONLY
  return {hv,lv,s100,s20,m100,r20,in100,in20,result};
}
function adjSummary(p){ const a=(p.basic&&p.basic.adjustments)||{}; if(Array.isArray(a)) return '';
  return ADJ_CODES.filter(c=>a[c]&&a[c].on).map(c=>{ const v=a[c];
    const val=(ADJ_SPEC[c].other&&v.val===ADJ_SPEC[c].other&&v.other)?v.other:v.val; return c+(val?`: ${val}`:''); }).join(', '); }

/* CV% color tier + per-point outlier marking (Platinum) */
function cvClass(cv){ if(isNaN(cv)) return ''; return cv<1?'cv-good':(cv<=2?'cv-warn':'cv-bad'); }
function condOverall(p,cond){ const isMulti=p.channelType==='multi'; let any=false,all=true;
  for(const pt of ['low','mid','high']){ const r=computePoint(p.model,pt,p.measurements[cond][pt],isMulti);
    if(r.overall===null) continue; any=true; if(!r.overall) all=false; } return any?(all?'pass':'fail'):'pending'; }
function markOutliers(p){
  for(const cond of ['asFound','asLeft']) for(const pt of ['low','mid','high']){
    const present=p.measurements[cond][pt].map(Number).filter(x=>!isNaN(x));
    const m=mean(present), sd=sampleSD(present);
    p.measurements[cond][pt].forEach((v,i)=>{ const el=document.getElementById(`rd-${cond}-${pt}-${i}-${p.id}`); if(!el) return;
      const x=parseFloat(v); el.classList.toggle('outlier', !isNaN(x)&&!isNaN(sd)&&sd>0&&Math.abs(x-m)>2*sd); });
  }
}

function renderPipettes(){
  const host=document.getElementById('pipettes'); host.innerHTML='';
  document.getElementById('emptyMsg').style.display = state.pipettes.length?'none':'';
  state.pipettes.forEach(p=>{ host.appendChild(p.serviceLevel==='basic'?renderBasic(p):renderPlatinum(p)); });
}
function modelOptions(sel){ return MODELS.map(m=>`<option ${m===sel?'selected':''}>${m}</option>`).join(''); }
function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }

function renderPlatinum(p){
  const isMulti=p.channelType==='multi';
  const node=el(`<div class="pipette platinum" id="pip-${p.id}">
    <div class="pipette-head">
      <span class="title">Pipette #${p.id}</span>
      <span id="ov-${p.id}"></span>
      <div class="spacer"></div>
      <button class="sm" onclick="dupPipette(${p.id})">Duplicate</button>
      <button class="sm danger" onclick="removePipette(${p.id})">Remove</button>
    </div>
    <div class="grid">
      <div><label>Brand / Model</label><input list="brandlist" value="${p.brandModel||''}" onchange="setField(${p.id},'brandModel',this.value)"></div>
      <div><label>ISO Model (volume class)</label><select onchange="setField(${p.id},'model',this.value)">${modelOptions(p.model)}</select></div>
      <div><label>Serial #</label><input value="${p.serial||''}" onchange="setField(${p.id},'serial',this.value)">${isDupSerial(p)?'<div class="dupwarn">⚠ Duplicate serial in this session</div>':''}</div>
      <div><label>Channel Type</label><select onchange="setField(${p.id},'channelType',this.value)">
        <option value="single" ${!isMulti?'selected':''}>Single</option>
        <option value="multi" ${isMulti?'selected':''}>Multi</option></select></div>
    </div>
    ${['asFound','asLeft'].map(cond=>condTable(p,cond,isMulti)).join('')}
    <div class="calc" id="calc-${p.id}"></div>
    <div style="margin-top:10px"><label>Comments (damage, observations, etc.)</label>
      <input value="${ae(p.comments)}" onchange="setField(${p.id},'comments',this.value)"></div>
  </div>`);
  setTimeout(()=>renderOneCalc(p),0);
  return node;
}
function condTable(p,cond,isMulti){
  const label = cond==='asFound'?'As Found':'As Left';
  let rows='';
  for(const pt of ['low','mid','high']){
    const nom = TEST_VOLUMES[p.model][pt];
    const step = vprec(nom)===2?'0.01':'0.1';
    const cells = [0,1,2,3].map(i=>`<td><input id="rd-${cond}-${pt}-${i}-${p.id}" type="number" step="${step}" min="0" value="${p.measurements[cond][pt][i]||''}" onchange="setReading(${p.id},'${cond}','${pt}',${i},this.value)"></td>`).join('');
    rows+=`<tr><th>${pt.toUpperCase()} (${fmt(nom)} µL)</th>${cells}</tr>`;
  }
  return `<div style="margin-top:8px"><strong>${label}</strong>
    <table><tr><th>Point</th><th>R1</th><th>R2</th><th>R3</th><th>R4</th></tr>${rows}</table></div>`;
}
function badge(pass){ return pass===null?`<span class="status pending">PENDING</span>`
  : pass?`<span class="status pass">✓ PASS</span>`:`<span class="status fail">✗ FAIL</span>`; }

function condPanel(p,cond,isMulti){
  let html=`<div style="margin-top:6px"><strong>${cond==='asFound'?'As Found':'As Left'} — ISO 8655 evaluation</strong>`;
  for(const pt of ['low','mid','high']){
    const r=computePoint(p.model,pt,p.measurements[cond][pt],isMulti);
    if(!r.spec){ html+=`<div class="pt muted">${pt.toUpperCase()} (${fmt(r.nominal)} µL): no ISO spec for this model/channel</div>`; continue; }
    html+=`<div class="pt"><strong>${pt.toUpperCase()} (${fmt(r.nominal)} µL):</strong>
      Mean ${fmt(r.mean)} µL · SD ${fmt(r.sd,3)} µL · CV <span class="${cvClass(r.cv)}">${isNaN(r.cv)?'—':r.cv.toFixed(2)+'%'}</span>
      ${r.correctionApplied?`· <span class="muted">Z=${r.z.toFixed(5)}</span>`:''}<br>
      Accuracy [${fmt(r.spec.accuracy.from)}–${fmt(r.spec.accuracy.to)} µL] ${badge(r.accuracyPass)}
      · Precision (SD ≤ ${fmt(r.spec.precision.ul,3)} µL) ${badge(r.precisionPass)}
      · Overall ${badge(r.overall)}</div>`;
  }
  return html+'</div>';
}
function renderOneCalc(p){
  if(p.serviceLevel==='basic') return;
  const box=document.getElementById('calc-'+p.id); if(!box) return;
  const isMulti=p.channelType==='multi';
  box.innerHTML = condPanel(p,'asFound',isMulti) + condPanel(p,'asLeft',isMulti);
  const af=condOverall(p,'asFound'), al=condOverall(p,'asLeft');
  const h=document.getElementById('ov-'+p.id);
  if(h) h.innerHTML=`<span class="muted" style="font-size:11px">AF</span> ${badge(af==='pending'?null:af==='pass')} `
    +`<span class="muted" style="font-size:11px">AL</span> ${badge(al==='pending'?null:al==='pass')}`;
  markOutliers(p);
}

function adjRow(p,code){
  const spec=ADJ_SPEC[code]; const a=((p.basic.adjustments||{})[code])||{on:false,val:'',other:''};
  let detail='';
  if(a.on){
    detail=`<select onchange="setAdj(${p.id},'${code}','val',this.value)"><option value="">— select —</option>`
      +spec.opts.map(o=>`<option ${a.val===o?'selected':''}>${o}</option>`).join('')+`</select>`;
    if(spec.other && a.val===spec.other)
      detail+=`<input style="margin-top:4px" placeholder="specify" value="${ae(a.other)}" onchange="setAdj(${p.id},'${code}','other',this.value)">`;
  }
  return `<div style="margin-bottom:6px"><label style="display:inline-flex;gap:6px;align-items:center;color:var(--ink);font-size:13px">
    <input type="checkbox" style="width:auto" ${a.on?'checked':''} onchange="setAdj(${p.id},'${code}','on',this.checked)"> ${spec.label}</label>
    ${a.on?`<div style="margin-top:4px;max-width:280px">${detail}</div>`:''}</div>`;
}
function renderBasic(p){

  const node=el(`<div class="pipette basic" id="pip-${p.id}">
    <div class="pipette-head">
      <span class="title">Pipette #${p.id} <span class="muted">(Basic)</span></span>

    </div>

    <div style="margin-top:10px"><strong>1. As-Found — In Spec?</strong>
      <div class="grid" style="margin-top:4px">
        <div><label>Status (tech marks)</label><select onchange="setBasic(${p.id},'asFoundSpec',this.value)">
          <option value="" ${!p.basic.asFoundSpec?'selected':''}>— not checked —</option>
          <option value="in" ${p.basic.asFoundSpec==='in'?'selected':''}>In Spec</option>
          <option value="out" ${p.basic.asFoundSpec==='out'?'selected':''}>Out of Spec</option></select></div>
        ${oos?`<div><label>Reason (required)</label><select onchange="setBasic(${p.id},'outOfSpecReason',this.value)">
          <option value="">— select —</option>${OOS_REASONS.map(r=>`<option ${p.basic.outOfSpecReason===r?'selected':''}>${r}</option>`).join('')}</select></div>
        <div><label>Reason note</label><input value="${ae(p.basic.reasonNote)}" onchange="setBasic(${p.id},'reasonNote',this.value)"></div>`:''}
      </div>
      ${oos&&!p.basic.outOfSpecReason?'<div class="dupwarn">⚠ A reason is required for out of spec.</div>':''}
    </div>

    <div style="margin-top:10px"><strong>2. Adjustments</strong>
      <div style="margin-top:6px">${ADJ_CODES.map(code=>adjRow(p,code)).join('')}</div></div>

    <div style="margin-top:10px"><strong>3. Final readings (after calibration)</strong>
      <div style="margin-top:4px"><em class="muted">100% — ${fmt(c.hv)} µL (4 readings)</em>
        <table><tr>${[0,1,2,3].map(i=>`<td><input type="number" step="0.1" value="${ae(p.basic.readings100[i])}" onchange="setBasicArr(${p.id},'readings100',${i},this.value)"></td>`).join('')}</tr></table>
        <div class="hint">Mean ${fmt(c.m100)} µL · ISO ${c.s100?fmt(c.s100.accuracy.from)+'–'+fmt(c.s100.accuracy.to)+' µL':'—'} ${c.in100==null?'':badge(c.in100)}</div></div>
      <div style="margin-top:6px"><em class="muted">20% — ${fmt(c.lv)} µL (1 reading)</em>
        <table><tr><td style="max-width:140px"><input type="number" step="0.1" value="${ae(p.basic.reading20)}" onchange="setBasic(${p.id},'reading20',this.value)"></td></tr></table>
        <div class="hint">ISO ${c.s20?fmt(c.s20.accuracy.from)+'–'+fmt(c.s20.accuracy.to)+' µL':'—'} ${c.in20==null?'':badge(c.in20)}</div></div>
      <div class="hint" style="margin-top:4px">Overall (final readings): ${badge(c.result==='pending'?null:c.result==='pass')}</div></div>

    <div style="margin-top:10px"><label>Comments / Other (damage, observations, etc.)</label>
      <input value="${ae(p.comments)}" onchange="setField(${p.id},'comments',this.value)"></div>
  </div>`);
  return node;
}

/* ====================== CERTIFICATE ====================== */
function renderCert(){ document.getElementById('certBody').innerHTML = buildCert(); }
function buildCert(){
  if(!state.pipettes.length) return '<div class="card">No pipettes to certify.</div>';
  return state.pipettes.map(p=>{
    const head=`<div class="cert"><h3>Calibration Certificate — ISO 8655</h3>
      <div class="meta">Work Order: <strong>${state.workOrder||'—'}</strong> · Invoice: ${state.invoice||'—'}
      · Technician: ${state.technician||'—'} · Client: ${state.client||'—'}
      · Service: ${(p.serviceLevel||'').toUpperCase()} · Cal date: ${state.calDate||'—'}<br>
      Pipette: ${p.brandModel||'—'} (${p.serviceLevel==='basic'?'Basic':p.model}) · Serial: ${p.serial||'—'}
      ${p.serviceLevel==='platinum'?`· Channel: ${p.channelType}`:''}
      ${p.serviceLevel==='platinum'&&envConditions().ok?`<br>Env: ${state.temperature}°C, ${state.pressure} kPa, ${state.humidity}%RH · Z=${envConditions().z.toFixed(5)}`:''}
      </div>`;
    if(p.serviceLevel==='basic'){
      const c=computeBasic(p);
      const af = p.basic.asFoundSpec==='out'
        ? `Out of Spec — ${p.basic.outOfSpecReason||'(no reason)'}${p.basic.reasonNote?' ('+p.basic.reasonNote+')':''}`
        : (p.basic.asFoundSpec==='in'?'In Spec':'—');
      return head+`<div class="meta">As-found: <strong>${af}</strong></div>
        <table><tr><th>Point</th><th>Reading(s) µL</th><th>ISO range µL</th><th>In spec</th></tr>
        <tr><td>100% (${fmt(c.hv)})</td><td>${p.basic.readings100.filter(x=>x!=='').join(', ')||'—'} (mean ${fmt(c.m100)})</td>
        <td>${c.s100?fmt(c.s100.accuracy.from)+'–'+fmt(c.s100.accuracy.to):'—'}</td><td>${c.in100==null?'—':c.in100?'PASS':'FAIL'}</td></tr>
        <tr><td>20% (${fmt(c.lv)})</td><td>${p.basic.reading20||'—'}</td>
        <td>${c.s20?fmt(c.s20.accuracy.from)+'–'+fmt(c.s20.accuracy.to):'—'}</td><td>${c.in20==null?'—':c.in20?'PASS':'FAIL'}</td></tr></table>
        <div class="meta">Adjustments: ${adjSummary(p)||'—'} · <strong>Result: ${c.result.toUpperCase()}</strong>${p.comments?` · Comments: ${p.comments}`:''}</div></div>`;
    }
    const isMulti=p.channelType==='multi';
    let rows='';
    for(const pt of ['low','mid','high']){
      const r=computePoint(p.model,pt,p.measurements.asLeft[pt],isMulti);
      rows+=`<tr><td>${pt.toUpperCase()}</td><td>${fmt(r.nominal)}</td><td>${fmt(r.mean)}</td>
        <td>${fmt(r.sd,3)}</td><td>${isNaN(r.cv)?'—':r.cv.toFixed(2)}</td>
        <td>${r.spec?fmt(r.spec.precision.ul,3):'—'}</td>
        <td>${r.accuracyPass==null?'—':r.accuracyPass?'PASS':'FAIL'}</td>
        <td>${r.precisionPass==null?'—':r.precisionPass?'PASS':'FAIL'}</td>
        <td>${r.overall==null?'—':r.overall?'PASS':'FAIL'}</td></tr>`;
    }
    return head+`<table>
      <tr><th>Point</th><th>Nominal µL</th><th>Mean µL</th><th>SD µL</th><th>CV %</th><th>SD limit µL</th><th>Accuracy</th><th>Precision</th><th>Overall</th></tr>
      ${rows}</table>
      <div class="meta">Accuracy = mean within ISO range. Precision = sample SD ≤ ISO limit. (As Left results shown.)${p.comments?` · Comments: ${p.comments}`:''}</div></div>`;
  }).join('');
}

/* ====================== PERSISTENCE / EXPORT / IMPORT ====================== */
function saveSession(){ syncSessionFromInputs();
  const snap=JSON.parse(JSON.stringify(state)); snap.savedAt=new Date().toLocaleString();
  snap.label=(state.workOrder||('Session '+(history.length+1)));
  history.unshift(snap); localStorage.setItem(STORE_KEY+'_history', JSON.stringify(history.slice(0,100)));
  renderHistory(); alert('Saved to history: '+snap.label);
}
function renderHistory(){
  const h=document.getElementById('histBody');
  if(!history.length){ h.innerHTML='<span class="muted">No saved sessions.</span>'; return; }
  h.innerHTML=history.map((s,i)=>`<div class="hist-row"><div><strong>${s.label}</strong>
    <div class="muted">${s.savedAt} · ${s.pipettes.length} pipette(s) · ${(s.serviceLevel||'').toUpperCase()}</div></div>
    <div class="spacer"></div><button class="sm" onclick="recall(${i})">Recall</button>
    <button class="sm danger" onclick="delHist(${i})">Delete</button></div>`).join('');
}
function recall(i){ if(!confirm('Replace current session with this saved one?')) return;
  state=Object.assign(defaultState(),JSON.parse(JSON.stringify(history[i]))); delete state.savedAt; delete state.label;
  autoSave(); hydrate(); showTab('cal'); }
function delHist(i){ history.splice(i,1); localStorage.setItem(STORE_KEY+'_history',JSON.stringify(history)); renderHistory(); }

function exportJSON(){ syncSessionFromInputs();
  dl(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}), (state.workOrder||'calibration')+'.json'); }
function importJSON(file){ if(!file) return; const r=new FileReader();
  r.onload=()=>{ try{ state=Object.assign(defaultState(),JSON.parse(r.result)); autoSave(); hydrate(); alert('Imported.'); }
  catch(e){ alert('Invalid JSON: '+e.message); } }; r.readAsText(file); }
function exportCSV(){ syncSessionFromInputs();
  const esc=v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`;
  const cols=['workOrder','pipette','model','serial','service','point','nominal','mean','sd','cv','sd_limit','accuracy','precision','overall'];
  const rows=[cols.join(',')];
  state.pipettes.forEach(p=>{
    if(p.serviceLevel==='basic'){ const c=computeBasic(p);
      const af=p.basic.asFoundSpec==='out'?('OutOfSpec:'+(p.basic.outOfSpecReason||'')):(p.basic.asFoundSpec==='in'?'InSpec':'');
      rows.push([state.workOrder,p.brandModel,p.model,p.serial,'basic','100%',c.hv,fmt(c.m100),'-',af,c.s100?`${fmt(c.s100.accuracy.from)}-${fmt(c.s100.accuracy.to)}`:'',c.in100==null?'':c.in100?'PASS':'FAIL',adjSummary(p),c.result].map(esc).join(','));
      rows.push([state.workOrder,p.brandModel,p.model,p.serial,'basic','20%',c.lv,p.basic.reading20||'','-',af,c.s20?`${fmt(c.s20.accuracy.from)}-${fmt(c.s20.accuracy.to)}`:'',c.in20==null?'':c.in20?'PASS':'FAIL',adjSummary(p),c.result].map(esc).join(',')); return; }
    const isMulti=p.channelType==='multi';
    ['low','mid','high'].forEach(pt=>{ const r=computePoint(p.model,pt,p.measurements.asLeft[pt],isMulti);
      rows.push([state.workOrder,p.brandModel,p.model,p.serial,'platinum',pt,r.nominal,fmt(r.mean),fmt(r.sd,3),
        isNaN(r.cv)?'':r.cv.toFixed(2), r.spec?r.spec.precision.ul:'', r.accuracyPass==null?'':r.accuracyPass?'PASS':'FAIL',
        r.precisionPass==null?'':r.precisionPass?'PASS':'FAIL', r.overall==null?'':r.overall?'PASS':'FAIL'].map(esc).join(',')); });
  });
  dl(new Blob([rows.join('\n')],{type:'text/csv'}), (state.workOrder||'calibration')+'.csv');
}
function dl(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href); }

/* ====================== UI PLUMBING ====================== */
function showTab(t){ ['cal','cert','hist'].forEach(x=>{ document.getElementById('tab-'+x).style.display = x===t?'':'none';
  document.getElementById('t-'+x).classList.toggle('active', x===t); });
  if(t==='cert') renderCert(); if(t==='hist') renderHistory(); }
function toggleDark(){ document.body.classList.toggle('dark');
  localStorage.setItem('platinumDarkMode', document.body.classList.contains('dark')?'1':'0');
  document.getElementById('darkBtn').textContent = document.body.classList.contains('dark')?'☀ Light':'🌙 Dark'; }
function hydrate(){
  ['serviceLevel','technician','client','location','serviceDate','calDate','frequency','counter','workOrder','invoice','balanceInfo','temperature','pressure','humidity'].forEach(id=>{
    const el=document.getElementById(id); if(el && state[id]!=null) el.value=state[id]; });
  onServiceChange(); ['temperature','pressure','humidity'].forEach(validateEnv); showZ(); renderPipettes(); renderHistory();
}
document.addEventListener('keydown',e=>{
  if(!(e.ctrlKey||e.metaKey)) return;
  if(e.key==='n'){ e.preventDefault(); addPipette(); }
  else if(e.key==='d'){ e.preventDefault(); addPipette(true); }
  else if(e.key==='s'){ e.preventDefault(); saveSession(); }
});

/* init */
(function init(){
  if(localStorage.getItem('platinumDarkMode')==='1'){ document.body.classList.add('dark'); document.getElementById('darkBtn').textContent='☀ Light'; }
  // brand datalist
  const dl=document.createElement('datalist'); dl.id='brandlist';
  dl.innerHTML=BRANDS.concat(loadBrands()).map(b=>`<option value="${b}">`).join(''); document.body.appendChild(dl);
  if(!state.serviceDate){ state.serviceDate=new Date().toISOString().slice(0,10); }
  hydrate(); autoNumbers();
})();
</script>
